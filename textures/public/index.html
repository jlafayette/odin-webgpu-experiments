<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Textures</title>
	<link rel="preload" href="_main.wasm" as="fetch" type="application/wasm" crossorigin="anonymous" />
	<style>
		* {
			margin: 0 !important;
			padding: 0 !important;
		}

		body {
			height: 100%;
			background-color: rgb(100, 100, 100);
		}

		canvas {
			position: absolute;
			/* top: 0%;
			left: 0%; */
			width: 100%;
			height: 100%;
			display: block;
		}
	</style>
</head>

<body>
	<script type="module" src="./odin.js"></script>
	<script type="module" src="./wgpu.js"></script>
	<canvas id="canvas-1" width="640" height="480"></canvas>
	<script type="text/javascript">
		let canvas = document.getElementById("canvas-1");
		canvas.width = window.innerWidth;
		canvas.height = window.innerHeight;
		document.body.style.overflow = 'hidden';

		window.addEventListener('load', function () {
			const mem = new WebAssembly.Memory({ initial: 2000, maximum: 65536, shared: false });
			const memInterface = new odin.WasmMemoryInterface();
			memInterface.setMemory(mem);

			const wgpuInterface = new odin.WebGPUInterface(memInterface);

			let custom_imports = {
				wgpu: wgpuInterface.getInterface(),
			};
			odin.runWasm("./_main.wasm", null, custom_imports, memInterface, /*intSize=8*/ );
		});
	</script>

</body>

</html>
